name: 🐛 Bug Report
description: Report a bug in the Fleeks Python SDK
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: "Output of `pip show fleeks-sdk` or check pyproject.toml"
      placeholder: "e.g. 0.3.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python --version`"
      placeholder: "e.g. 3.11.5"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - "Client / Authentication"
        - "Environments (create, start, stop)"
        - "Files / File System"
        - "Code Execution"
        - "AI Agent Integration"
        - "WebSocket / Real-time"
        - "CLI Integration"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Code to Reproduce
      description: Minimal code snippet that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include full error traceback if applicable.
    validations:
      required: true
